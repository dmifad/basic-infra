# Promtail config для basic-infra observability stack.
#
# Читает Docker socket, собирает stdout/stderr контейнеров, парсит JSON
# (если совместимо с контрактом логов из ADR-0011), отправляет в Loki
# с лейблами service / env / tenant.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            # Только контейнеры, явно opt-in в logging.
            # Платформенные сервисы помечаются compose'ом; клиентские —
            # в момент adoption (Week 11).
            values: ["basic-infra.observability.logs=true"]

    relabel_configs:
      # Извлекаем service из docker label.
      - source_labels: [__meta_docker_container_label_basic_infra_observability_service]
        target_label: service
      # env / tenant приходят из docker labels или env vars контейнера.
      - source_labels: [__meta_docker_container_label_basic_infra_observability_env]
        target_label: env
      - source_labels: [__meta_docker_container_label_basic_infra_observability_tenant]
        target_label: tenant
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container

    pipeline_stages:
      # Парсим JSON-формат, заданный SDK setup_logging.
      # Если строка не JSON — оставляем как text (это нормально для
      # stderr от сторонних библиотек, до полного adoption).
      - json:
          expressions:
            timestamp: timestamp
            level: level
            event: event
            request_id: request_id
            tenant_log: tenant
          drop_malformed: false

      # Поднимаем level в лейбл (низкая кардинальность — фиксированный набор).
      - labels:
          level:

      # Если в логе явно указан tenant — он перезаписывает container-label.
      # Защищает от случаев когда контейнер обслуживает несколько тенантов
      # (multi-tenant worker).
      - template:
          source: tenant
          template: '{{ if .tenant_log }}{{ .tenant_log }}{{ else }}{{ .tenant }}{{ end }}'
      - labels:
          tenant:

      # request_id НЕ поднимаем в лейбл — это high-cardinality, остаётся
      # в JSON-теле и доступен через LogQL filter.

      # Используем timestamp из лога, не время прибытия в Promtail.
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.000Z07:00"
