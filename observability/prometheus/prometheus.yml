# Prometheus scrape config для basic-infra observability stack.
#
# Принципы:
# - Pull-based, /metrics на каждом сервисе.
# - Стандартные лейблы (service, env, tenant) добавляются сервисами через
#   prometheus_client, не через relabel в Prometheus.
# - Docker SD используется для автодискавери сервисов в compose-сети.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    # env НЕ задаётся на уровне Prometheus — он приходит per-service через
    # SDK-лейблы (ADR-0011). Cluster-level external_labels.env убран до
    # появления HA/federation (тогда вернётся как discriminator кластера).
    cluster: basic-infra

scrape_configs:
  # Платформенные компоненты ---------------------------------------

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]
        labels:
          service: promtail

  # LLM gateway (если экспонирует /metrics — см. llm/ contract) -----
  # Закомментировано до тех пор, пока LLM gateway не адаптирован.
  # Раскомментируется в applied track (Week 11).
