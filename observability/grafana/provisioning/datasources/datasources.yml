# Grafana datasources — провижионинг.
#
# Поднимаются при старте Grafana, добавлять вручную через UI не нужно.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 5000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: 'request_id=([\w-]+)'
          name: request_id
          url: '$${__value.raw}'
