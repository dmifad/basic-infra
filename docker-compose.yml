# ============================================================================
# basic-infra — top-level orchestration
#
# Service definitions live in per-stack fragments under llm/compose/ and are
# merged here via `include`.
#
# Profiles:
#   basic     gateway + redis            (always needed)
#   llm-cpu   T-pro on CPU + TEI         (works without a GPU)
#   llm-gpu   T-pro on GPU + TEI         (needs the nvidia runtime)
#
#   make up                        -> basic + llm-gpu
#   make up DEFAULT_PROFILE=llm-cpu -> basic + llm-cpu
#
# The gateway is published on 127.0.0.1 only (ADR-0003). Backends (llama.cpp,
# TEI, Redis) stay internal to the compose network.
# ============================================================================
name: basic-infra

include:
  - llm/compose/compose.redis.yml
  - llm/compose/compose.gateway.yml
  - llm/compose/compose.llama-cpp.yml
  - llm/compose/compose.tei.yml
  - storage/compose/minio.yml
  - observability/compose/observability.yml
  - postgres/compose/postgres.yml
  - tracing/compose/tracing.yml
