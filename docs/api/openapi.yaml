# ============================================================================
# basic-infra LLM platform — formal API contract
#
# OpenAPI 3.1.0. This is the SINGLE SOURCE OF TRUTH for the HTTP contract.
# Pydantic v2 schemas under llm/gateway/app/schemas/ must match this exactly.
#
# References: ADR-0002 (API contract), ADR-0003 (multi-tenancy).
# Validate with:  openapi-spec-validator docs/api/openapi.yaml
# ============================================================================
openapi: 3.1.0

info:
  title: basic-infra LLM gateway
  version: 0.1.0
  description: |
    OpenAI-compatible LLM gateway for the author's project ecosystem.

    Standard endpoints follow the OpenAI API subset; `/v1/rerank` follows the
    Cohere reranking contract (OpenAI has no equivalent — see ADR-0002).

    All `/v1/*` endpoints require `Authorization: Bearer <api_key>`. Operational
    endpoints (`/health`, `/ready`) are unauthenticated.

    Vendor extensions beyond the OpenAI spec are namespaced under `metadata`
    and the `capabilities` field on models. Standard SDKs ignore unknown fields.
  contact:
    name: basic-infra
  license:
    name: Personal project — no license declared

servers:
  - url: http://localhost:8003
    description: Local single-host install (127.0.0.1 only — see ADR-0003)

tags:
  - name: chat
    description: Chat and text completion
  - name: embeddings
    description: Vector embeddings
  - name: rerank
    description: Document reranking (Cohere-style)
  - name: models
    description: Model discovery
  - name: tenants
    description: Tenant identity
  - name: ops
    description: Operational endpoints (liveness / readiness)

security:
  - bearerAuth: []

paths:

  # ─── Chat completions ────────────────────────────────────────────────────
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      tags: [chat]
      summary: Create a chat completion
      description: OpenAI-compatible. Streaming, tools and `n > 1` are not supported in v1.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Completion produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/BackendUnavailable" }
        "504": { $ref: "#/components/responses/BackendTimeout" }

  # ─── Legacy text completions ─────────────────────────────────────────────
  /v1/completions:
    post:
      operationId: createCompletion
      tags: [chat]
      summary: Create a legacy text completion
      description: Legacy OpenAI text-completion endpoint. Optional but useful for older clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/BackendUnavailable" }
        "504": { $ref: "#/components/responses/BackendTimeout" }

  # ─── Embeddings ──────────────────────────────────────────────────────────
  /v1/embeddings:
    post:
      operationId: createEmbedding
      tags: [embeddings]
      summary: Create embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
      responses:
        "200":
          description: Embeddings produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/BackendUnavailable" }
        "504": { $ref: "#/components/responses/BackendTimeout" }

  # ─── Rerank (Cohere-style) ───────────────────────────────────────────────
  /v1/rerank:
    post:
      operationId: createRerank
      tags: [rerank]
      summary: Rerank documents against a query
      description: Cohere-style reranking contract (ADR-0002). Not part of the OpenAI API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerankRequest"
      responses:
        "200":
          description: Documents reranked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RerankResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/BackendUnavailable" }
        "504": { $ref: "#/components/responses/BackendTimeout" }

  # ─── Models ──────────────────────────────────────────────────────────────
  /v1/models:
    get:
      operationId: listModels
      tags: [models]
      summary: List models available to the current tenant
      description: |
        Returns models filtered by the tenant's `allowed_models`. The
        `capabilities` array on each model is a vendor extension.
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ─── Tenant identity ─────────────────────────────────────────────────────
  /v1/tenants/me:
    get:
      operationId: getCurrentTenant
      tags: [tenants]
      summary: Identity of the authenticated tenant
      description: For SDK debugging — resolves the Bearer key to its tenant.
      responses:
        "200":
          description: Tenant identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantIdentity"
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ─── Operational ─────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [ops]
      summary: Liveness probe
      description: Always 200 if the process is up. Does not check backends.
      security: []
      responses:
        "200":
          description: Process alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ready:
    get:
      operationId: getReady
      tags: [ops]
      summary: Readiness probe
      description: 200 only if every registered backend is healthy; 503 otherwise.
      security: []
      responses:
        "200":
          description: All backends healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyStatus"
        "503":
          description: One or more backends unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyStatus"

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        `Authorization: Bearer <api_key>`. The api_key is issued per tenant by
        the tenant CLI. Optionally pair with the `X-Tenant-ID` header, which
        must agree with the key's tenant or the request is rejected with 403.

  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Tenant not permitted to use this model, or X-Tenant-ID mismatch
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ModelNotFound:
      description: Model is not registered in the backend registry
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Per-tenant rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the bucket refills
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ServerError:
      description: Unexpected gateway error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    BackendUnavailable:
      description: The backend serving this model is unreachable or unhealthy
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    BackendTimeout:
      description: The backend did not respond within the timeout
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:

    # ─── Error envelope (OpenAI-style) ─────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
              description: Human-readable error description
            type:
              type: string
              description: Coarse error category
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - not_found_error
                - rate_limit_error
                - api_error
                - backend_error
            code:
              type: [string, "null"]
              description: Fine-grained machine-readable error code
              examples: [model_not_found, backend_unavailable]
            param:
              type: [string, "null"]
              description: Request field the error refers to, if any

    # ─── Chat ──────────────────────────────────────────────────────────────
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
        name:
          type: [string, "null"]

    JsonSchemaSpec:
      type: object
      required: [name, schema]
      properties:
        name:
          type: string
        schema:
          type: object
          description: A JSON Schema object the output must conform to
        strict:
          type: boolean
          default: true
        description:
          type: [string, "null"]

    JsonObjectFormat:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: json_object

    JsonSchemaFormat:
      type: object
      required: [type, json_schema]
      properties:
        type:
          type: string
          const: json_schema
        json_schema:
          $ref: "#/components/schemas/JsonSchemaSpec"

    TextFormat:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: text
          default: text

    ResponseFormat:
      description: Output formatting directive — free-form JSON, schema-constrained, or plain text.
      oneOf:
        - $ref: "#/components/schemas/JsonObjectFormat"
        - $ref: "#/components/schemas/JsonSchemaFormat"
        - $ref: "#/components/schemas/TextFormat"

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Platform model ID (version-pinned — no `latest` alias)
        messages:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ChatMessage" }
        temperature:
          type: number
          minimum: 0.0
          maximum: 2.0
          default: 0.1
        top_p:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 1.0
        max_tokens:
          type: [integer, "null"]
          minimum: 1
        stop:
          description: Stop sequence(s)
          anyOf:
            - type: string
            - type: array
              items: { type: string }
            - type: "null"
        seed:
          type: [integer, "null"]
        n:
          type: integer
          minimum: 1
          maximum: 1
          default: 1
          description: Only n=1 is supported in v1
        response_format:
          anyOf:
            - $ref: "#/components/schemas/ResponseFormat"
            - type: "null"

    ChatCompletionUsage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }

    GatewayMetadata:
      description: Vendor extension — not part of the OpenAI spec.
      type: object
      required: [backend]
      properties:
        backend:
          type: string
          description: Name of the backend that served the request
        response_format_fallback:
          type: boolean
          default: false
          description: True if the backend could not honor response_format and fell back to free-form
        tenant_id:
          type: [string, "null"]

    ChatCompletionChoice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index: { type: integer }
        message: { $ref: "#/components/schemas/ChatMessage" }
        finish_reason:
          type: [string, "null"]
          enum: [stop, length, content_filter, tool_calls, null]

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices, usage, metadata]
      properties:
        id: { type: string }
        object:
          type: string
          const: chat.completion
        created:
          type: integer
          description: Unix timestamp (seconds)
        model: { type: string }
        choices:
          type: array
          items: { $ref: "#/components/schemas/ChatCompletionChoice" }
        usage: { $ref: "#/components/schemas/ChatCompletionUsage" }
        metadata: { $ref: "#/components/schemas/GatewayMetadata" }

    # ─── Legacy completions ────────────────────────────────────────────────
    CompletionRequest:
      type: object
      required: [model, prompt]
      properties:
        model: { type: string }
        prompt:
          anyOf:
            - type: string
            - type: array
              items: { type: string }
        temperature:
          type: number
          minimum: 0.0
          maximum: 2.0
          default: 0.1
        top_p:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 1.0
        max_tokens:
          type: [integer, "null"]
          minimum: 1
        stop:
          anyOf:
            - type: string
            - type: array
              items: { type: string }
            - type: "null"
        seed:
          type: [integer, "null"]
        n:
          type: integer
          minimum: 1
          maximum: 1
          default: 1

    CompletionChoice:
      type: object
      required: [index, text, finish_reason]
      properties:
        index: { type: integer }
        text: { type: string }
        finish_reason:
          type: [string, "null"]
          enum: [stop, length, content_filter, null]

    CompletionResponse:
      type: object
      required: [id, object, created, model, choices, usage, metadata]
      properties:
        id: { type: string }
        object:
          type: string
          const: text_completion
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items: { $ref: "#/components/schemas/CompletionChoice" }
        usage: { $ref: "#/components/schemas/ChatCompletionUsage" }
        metadata: { $ref: "#/components/schemas/GatewayMetadata" }

    # ─── Embeddings ────────────────────────────────────────────────────────
    EmbeddingRequest:
      type: object
      required: [model, input]
      properties:
        model: { type: string }
        input:
          description: A single string or an array of strings to embed
          anyOf:
            - type: string
            - type: array
              minItems: 1
              items: { type: string }
        dimensions:
          type: [integer, "null"]
          minimum: 1
          description: Requested embedding dimensionality; ignored by models that do not support it (e.g. BGE-M3)

    EmbeddingData:
      type: object
      required: [object, index, embedding]
      properties:
        object:
          type: string
          const: embedding
        index: { type: integer }
        embedding:
          type: array
          items: { type: number }

    EmbeddingUsage:
      type: object
      required: [prompt_tokens, total_tokens]
      properties:
        prompt_tokens: { type: integer }
        total_tokens: { type: integer }

    EmbeddingResponse:
      type: object
      required: [object, data, model, usage]
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items: { $ref: "#/components/schemas/EmbeddingData" }
        model: { type: string }
        usage: { $ref: "#/components/schemas/EmbeddingUsage" }

    # ─── Rerank ────────────────────────────────────────────────────────────
    RerankRequest:
      type: object
      required: [model, query, documents]
      properties:
        model: { type: string }
        query: { type: string }
        documents:
          type: array
          minItems: 1
          maxItems: 1000
          items: { type: string }
        top_n:
          type: [integer, "null"]
          minimum: 1
          description: Return at most this many results; all if omitted
        return_documents:
          type: boolean
          default: false
          description: If true, each result includes the document text

    RerankedDocument:
      type: object
      required: [text]
      properties:
        text: { type: string }

    RerankResult:
      type: object
      required: [index, relevance_score]
      properties:
        index:
          type: integer
          description: Position of the document in the request `documents` array
        relevance_score:
          type: number
          minimum: 0.0
          maximum: 1.0
        document:
          anyOf:
            - $ref: "#/components/schemas/RerankedDocument"
            - type: "null"

    RerankResponse:
      type: object
      required: [id, object, model, results]
      properties:
        id: { type: string }
        object:
          type: string
          const: rerank
        model: { type: string }
        results:
          type: array
          items: { $ref: "#/components/schemas/RerankResult" }

    # ─── Models ────────────────────────────────────────────────────────────
    Model:
      type: object
      required: [id, object, owned_by, capabilities]
      properties:
        id: { type: string }
        object:
          type: string
          const: model
        created:
          type: [integer, "null"]
        owned_by:
          type: string
          description: Backend that owns the model
        capabilities:
          type: array
          description: Vendor extension — supported capabilities for this model
          items:
            type: string
            enum: [chat, completions, embeddings, rerank, structured]

    ModelList:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items: { $ref: "#/components/schemas/Model" }

    # ─── Tenant identity ───────────────────────────────────────────────────
    TenantIdentity:
      type: object
      required: [tenant_id, display_name, allowed_models]
      properties:
        tenant_id: { type: string }
        display_name: { type: string }
        allowed_models:
          type: array
          items: { type: string }
          description: Explicit model IDs, or a single "*" for all
        rate_limits:
          type: object
          additionalProperties: { type: string }
          description: 'Per-endpoint limit strings, e.g. {"chat.completions": "60/min"}'

    # ─── Operational ───────────────────────────────────────────────────────
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok

    BackendHealth:
      type: object
      required: [name, healthy]
      properties:
        name: { type: string }
        healthy: { type: boolean }
        consecutive_failures:
          type: integer
          minimum: 0
        last_checked:
          type: [string, "null"]
          format: date-time

    ReadyStatus:
      type: object
      required: [ready, backends]
      properties:
        ready:
          type: boolean
          description: True only if every backend is healthy
        backends:
          type: array
          items: { $ref: "#/components/schemas/BackendHealth" }
