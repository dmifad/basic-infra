# LLM gateway — the FastAPI service (ADR-0002, ADR-0003).
#
# Published on 127.0.0.1 only (ADR-0003 — Bearer auth in plain HTTP is only
# safe on localhost). The host port is GATEWAY_HOST_PORT (default 8003); it is
# overridable so basic-infra can coexist with another service on 8003.
#
# The gateway also joins the external `basic-infra-net` network so co-located
# client projects (telcoss, pamyat-naroda) can reach it container-to-container
# as `basic-infra-gateway:8003` — no host port, no loopback-binding conflict.
# Create the network once:  docker network create basic-infra-net
#
# Paths are relative to this file (llm/compose/).
networks:
  basic-infra-net:
    external: true

services:
  gateway:
    profiles: ["basic"]
    build:
      context: ../gateway
    container_name: basic-infra-gateway
    restart: unless-stopped
    # Run as the host user so the bind-mounted tenant DB stays host-writable
    # (lets `make tenants-seed` run from the host). Defaults to uid/gid 1000.
    user: "${GATEWAY_UID:-1000}:${GATEWAY_GID:-1000}"
    environment:
      TZ: Europe/Moscow
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: "8003"
      GATEWAY_LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-INFO}
      GATEWAY_LOG_FORMAT: ${GATEWAY_LOG_FORMAT:-json}
      TENANT_DB_PATH: /data/tenants/tenants.db
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_FAIL_OPEN: "true"
      BACKENDS_CONFIG: /app/backends.yaml
      BACKEND_HEALTH_INTERVAL_SECONDS: "30"
      BACKEND_UNHEALTHY_THRESHOLD: "3"
      # Upstream HTTP read budget (long-generation cap). connect/pool/write
      # budgets are short and fixed in the adapter; only this read budget is
      # tunable. Must be in environment: to reach the container (not just .env).
      BACKEND_REQUEST_TIMEOUT_SECONDS: "${BACKEND_REQUEST_TIMEOUT_SECONDS:-900}"
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8003}:8003"
    volumes:
      - ../../tenants:/data/tenants
      - ../backends.yaml:/app/backends.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - basic-infra-net
