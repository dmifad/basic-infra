# telcoss OIDC relying-party registration (ADR-0018, J-infra-bp / variant A).
#
# Auto-discovered + instantiated by Authentik (instantiate label) from the
# /blueprints/telcoss mount on server + worker. Declarative & idempotent —
# re-applied on every boot; objects are matched by `identifiers`.
#
# Variant A: PUBLIC PKCE client, NO refresh token (no offline_access scope, no
# refresh_token_validity). Access-token-only, 10-minute validity.
#
# !Find resolves existing platform objects by a [field, value] lookup; the slugs/
# cert name/scope_names were confirmed against the running 2026.5.3 instance
# (BP-0). redirect_uris is the 2026.5 list-of-objects shape ({matching_mode,url}).
version: 1
metadata:
  name: telcoss-oidc
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: telcoss-spa
    attrs:
      name: telcoss-spa
      client_type: public
      client_id: telcoss-spa
      # sub = user UUID (not the default hashed_user_id) so telcoss can map
      # sub → UserId (NewType over UUID) directly. See telcoss J1.
      sub_mode: user_uuid
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      redirect_uris:
        - matching_mode: strict
          url: "http://localhost:5173/callback"
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      access_token_validity: "minutes=10"
      # variant A: no refresh_token_validity (no offline_access → no refresh token)
  - model: authentik_core.application
    state: present
    identifiers:
      slug: telcoss
    attrs:
      name: telcoss
      slug: telcoss
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, telcoss-spa]]
      policy_engine_mode: any
