# basic-infra shared Redis (ADR-0014) — config.
# ACL users (incl. per-tenant) live in the aclfile; the control plane appends to
# it via ACL SETUSER + ACL SAVE. Set the admin password in users.acl before
# first start (see users.acl + runbook).

aclfile /usr/local/etc/redis/acl/users.acl

# Persistence on the NVMe tier (mounted at /data). AOF for durability.
dir /data
appendonly yes
appendfsync everysec

protected-mode yes
# Keep eviction predictable for a mixed cache/queue workload; tune per runbook.
maxmemory-policy noeviction
